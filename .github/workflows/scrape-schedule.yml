name: Lead Pool Scrape

# Triggers the cost-optimised scrape every 2 hours during Israeli business hours
# (08:30-20:30 Asia/Jerusalem). The backend itself ALSO enforces the time window
# as a defense-in-depth — manual triggers outside the window will be skipped.
#
# Why these specific UTC times:
#   Israel = UTC+2 (winter / IST) or UTC+3 (summer / IDT)
#   We schedule slightly inside the window to cover both DST states safely.
#
# Cron schedule (UTC):
#   06:30  →  08:30 IST / 09:30 IDT  (start of day)
#   08:30  →  10:30 IST / 11:30 IDT
#   10:30  →  12:30 IST / 13:30 IDT
#   12:30  →  14:30 IST / 15:30 IDT
#   14:30  →  16:30 IST / 17:30 IDT
#   16:30  →  18:30 IST / 19:30 IDT
#   18:30  →  20:30 IST / 21:30 IDT  (last run; 21:30 IDT will be skipped server-side)
#
# = 7 runs/day max. Backend gate filters out any that fall outside 08:30-20:30 IL.

on:
  schedule:
    - cron: '30 6,8,10,12,14,16,18 * * *'
  workflow_dispatch:  # allow manual trigger from GitHub UI
    inputs:
      force:
        description: 'Bypass time window + saturation check'
        required: false
        default: 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger cost-optimised scrape
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          # ── Diagnostic: verify secrets are wired ──────────────────────────
          echo "=== Secret diagnostics ==="
          if [ -z "$BACKEND_URL" ]; then
            echo "❌ BACKEND_URL is EMPTY — go to Settings → Secrets → Actions and add it"
            SECRETS_OK=false
          else
            echo "✅ BACKEND_URL is set (${#BACKEND_URL} chars)"
          fi

          if [ -z "$ADMIN_TOKEN" ]; then
            echo "❌ ADMIN_TOKEN is EMPTY — go to Settings → Secrets → Actions and add it"
            SECRETS_OK=false
          else
            echo "✅ ADMIN_TOKEN is set (${#ADMIN_TOKEN} chars)"
            # Warn if someone accidentally included "Bearer " in the secret
            if echo "$ADMIN_TOKEN" | grep -qi '^bearer '; then
              echo "⚠️  WARNING: ADMIN_TOKEN starts with 'Bearer ' — remove that prefix!"
              echo "    The workflow adds 'Bearer ' automatically."
              echo "    Secret should be ONLY the base64 string, e.g.: YWRtaW46YWRtaW46MTAwMA=="
            fi
          fi

          if [ "${SECRETS_OK}" = "false" ]; then
            exit 1
          fi
          echo ""

          # ── Fire the request ──────────────────────────────────────────────
          echo "=== Sending request ==="
          echo "URL: $BACKEND_URL/api/apify/run/all-groups"
          echo "force=$FORCE"
          echo ""

          # --max-time 60: Render free tier can take ~30s to wake up
          http_response=$(curl \
            --silent \
            --show-error \
            --max-time 60 \
            --write-out "HTTPSTATUS:%{http_code}" \
            -X POST \
            "$BACKEND_URL/api/apify/run/all-groups" \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"force\": $FORCE}" 2>&1)

          # Split body and status code
          body=$(echo "$http_response" | sed -e 's/HTTPSTATUS\:.*//g')
          status=$(echo "$http_response" | tr -d '\n' | sed -e 's/.*HTTPSTATUS://')

          echo "=== Server Response ==="
          echo "HTTP Status: $status"
          echo "Body:"
          echo "$body" | head -c 2000
          echo ""

          # ── Interpret the result ──────────────────────────────────────────
          if [ -z "$status" ] || [ "$status" = "000" ]; then
            echo "❌ No response from server — connection failed or timed out"
            echo "   Check that BACKEND_URL is correct and the server is running"
            exit 1
          fi

          if [ "$status" = "401" ]; then
            echo "❌ 401 Unauthorized — token rejected"
            echo "   ADMIN_TOKEN must be: base64(\"username:admin:timestamp\")"
            echo "   Example: btoa(\"admin:admin:1000\") → YWRtaW46YWRtaW46MTAwMA=="
            exit 1
          fi

          if [ "$status" = "403" ]; then
            echo "❌ 403 Forbidden — token decoded OK but role is not 'admin'"
            echo "   Make sure the middle segment is 'admin': base64(\"X:admin:Y\")"
            exit 1
          fi

          if [ "$status" != "200" ]; then
            echo "❌ Unexpected HTTP $status from server"
            exit 1
          fi

          # 200 — check if skipped or queued
          if echo "$body" | grep -q '"skipped"'; then
            echo "⏸  Skipped (outside time window or all categories saturated)"
          else
            echo "✅ Scrape successfully queued"
          fi
