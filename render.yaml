services:
  - type: web
    name: agentiq-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm rebuild better-sqlite3
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
